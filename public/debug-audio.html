<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>HPYNO Audio Debug v2</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: #0a0a12; color: #c0b0e0; font: 12px/1.4 monospace; overflow-x: hidden; }

/* ── Top bar ── */
.topbar { position: sticky; top: 0; z-index: 100; background: rgba(10,10,18,0.95); border-bottom: 1px solid rgba(200,160,255,0.1); padding: 8px 16px; display: flex; gap: 10px; align-items: center; flex-wrap: wrap; backdrop-filter: blur(8px); }
.topbar select, .topbar button { background: rgba(200,160,255,0.08); border: 1px solid rgba(200,160,255,0.2); color: #c0b0e0; padding: 4px 10px; border-radius: 3px; font: inherit; cursor: pointer; }
.topbar button:hover { background: rgba(200,160,255,0.15); }
.topbar button.active { background: rgba(200,160,255,0.25); border-color: #c8a0ff; color: #e0d0ff; }
.topbar .sep { width: 1px; height: 20px; background: rgba(200,160,255,0.15); }
.topbar .time { color: #a090c0; min-width: 110px; font-size: 11px; }
.topbar label { font-size: 11px; color: #806090; display: flex; align-items: center; gap: 4px; cursor: pointer; }
.topbar input[type=checkbox] { accent-color: #c8a0ff; }

/* ── Legend ── */
.legend { display: flex; gap: 12px; padding: 6px 16px; font-size: 10px; color: #605070; flex-wrap: wrap; border-bottom: 1px solid rgba(200,160,255,0.05); }
.legend-item { display: flex; align-items: center; gap: 3px; }
.legend-swatch { width: 10px; height: 10px; border-radius: 2px; }

/* ── Stage section ── */
.stage { margin: 0; border-bottom: 1px solid rgba(200,160,255,0.08); }
.stage-header { padding: 8px 16px 4px; font-size: 13px; color: #c8b0e0; display: flex; gap: 12px; align-items: baseline; }
.stage-header .meta { font-size: 10px; color: #605070; }

/* ── Timeline container ── */
.timeline-wrap { position: relative; overflow-x: auto; overflow-y: hidden; cursor: crosshair; }
.timeline-wrap::-webkit-scrollbar { height: 4px; }
.timeline-wrap::-webkit-scrollbar-thumb { background: rgba(200,160,255,0.2); border-radius: 2px; }
.timeline-canvas { display: block; }
.cursor-line { position: absolute; top: 0; bottom: 0; width: 1px; background: #c8a0ff; pointer-events: none; z-index: 10; box-shadow: 0 0 6px rgba(200,160,255,0.5); }
.hover-time { position: absolute; top: 2px; background: rgba(10,10,18,0.9); color: #a090c0; font-size: 9px; padding: 1px 4px; border-radius: 2px; pointer-events: none; z-index: 11; }

/* ── Words strip ── */
.words { display: flex; flex-wrap: wrap; gap: 1px 4px; padding: 4px 16px 8px; font-size: 10px; }
.word { padding: 1px 3px; border-radius: 2px; background: rgba(200,160,255,0.04); color: #706060; transition: all 0.08s; }
.word.active { background: rgba(200,160,255,0.2); color: #e0d0ff; }
.word.cmd { border-bottom: 1px solid rgba(255,100,80,0.5); }
.word.cmd.active { background: rgba(255,100,80,0.2); color: #ffc0a0; }
.word-sep { width: 1px; height: 12px; background: rgba(200,160,255,0.1); margin: 0 2px; }

/* ── Info bar ── */
.info { padding: 4px 16px 8px; font-size: 10px; color: #504060; }
</style>
</head>
<body>

<div class="topbar">
  <select id="sel-session">
    <option value="relax" selected>relax</option>
  </select>
  <div class="sep"></div>
  <button id="btn-play">&#9654; Play</button>
  <button id="btn-stop">&#9632; Stop</button>
  <span class="time" id="el-time">0:00.0 / 0:00</span>
  <button id="btn-prev">&laquo;</button>
  <button id="btn-next">&raquo;</button>
  <span id="el-stage" style="color:#806090">--</span>
  <div class="sep"></div>
  <button id="btn-ab" title="Toggle A/B (raw vs processed)">A/B</button>
  <div class="sep"></div>
  <select id="sel-view">
    <option value="waveform">Waveform</option>
    <option value="spectrogram">Spectrogram</option>
    <option value="split">Split (raw/proc)</option>
  </select>
  <div class="sep"></div>
  <label><input type="checkbox" id="chk-pauses" checked> Pauses</label>
  <label><input type="checkbox" id="chk-reverb" checked> Reverb</label>
  <label><input type="checkbox" id="chk-cmd" checked> CMD</label>
  <label><input type="checkbox" id="chk-gaps" checked> Gaps</label>
  <label><input type="checkbox" id="chk-slices" checked> Slices</label>
  <div class="sep"></div>
  <label>Zoom: <input type="range" id="zoom" min="1" max="10" step="0.5" value="1" style="width:80px"></label>
</div>

<div class="legend">
  <div class="legend-item"><div class="legend-swatch" style="background:rgba(100,160,255,0.4)"></div> waveform</div>
  <div class="legend-item"><div class="legend-swatch" style="background:rgba(255,200,100,0.3)"></div> gap</div>
  <div class="legend-item"><div class="legend-swatch" style="background:rgba(255,160,255,0.2)"></div> inserted pause</div>
  <div class="legend-item"><div class="legend-swatch" style="background:rgba(80,200,255,0.2)"></div> reverb</div>
  <div class="legend-item"><div class="legend-swatch" style="background:rgba(255,100,80,0.3)"></div> CMD</div>
  <div class="legend-item"><div class="legend-swatch" style="background:rgba(100,255,100,0.2)"></div> slice</div>
  <div class="legend-item"><div class="legend-swatch" style="background:#c8a0ff"></div> cursor</div>
</div>

<div id="stages"></div>

<script>
// ── State ──
let manifest = null;
let stageEffects = {};
let stageWaveforms = {};  // stageName → { raw: Float32Array, proc: Float32Array, sr: number }
let audio = null;
let currentStageIdx = 0;
let animFrame = null;
let abMode = false;  // false = processed, true = raw
let viewMode = 'waveform';
let zoom = 1;

const CMD_PHRASES = {
  'relax': {
    settle: ['just here', 'just now'],
    induction: ['to relax'],
    deepening: ['let it soften', 'let it go', 'permission to stop trying', 'let yourself sink'],
    trance: ['just allow this to happen', 'deeper now', 'everything carries you deeper'],
    deep: ['pure stillness', 'complete peace'],
  },
  'relax': {}
};

// ── DOM refs ──
const $stages = document.getElementById('stages');
const $time = document.getElementById('el-time');
const $stage = document.getElementById('el-stage');
const $zoom = document.getElementById('zoom');
const $view = document.getElementById('sel-view');
const $session = document.getElementById('sel-session');
const $ab = document.getElementById('btn-ab');

// ── Load session ──
async function loadSession(id) {
  stopPlayback();
  const resp = await fetch(`audio/${id}/manifest.json`);
  manifest = await resp.json();

  stageEffects = {};
  stageWaveforms = {};
  for (const stage of manifest.stages) {
    // Derive effects data from manifest word timestamps (no separate effects file needed)
    const fx = { pauses_inserted: [], cmd_words: [], reverb_regions: [], speed: 1, whisper_layer: false };
    const allWords = [];
    for (const line of stage.lines) {
      for (const w of (line.words || [])) {
        allWords.push({ start: line.startTime + w.start, end: line.startTime + w.end, word: w.word });
      }
    }
    // Detect pauses: gaps > 1.5s between words
    for (let i = 1; i < allWords.length; i++) {
      const gap = allWords[i].start - allWords[i-1].end;
      if (gap > 1.5) {
        fx.pauses_inserted.push({ at: allWords[i-1].end, duration: gap });
      }
    }
    stageEffects[stage.name] = fx;
    // Load waveform data
    try {
      const audioCtx = new (window.AudioContext || window.webkitAudioContext)();
      const procResp = await fetch(stage.file);
      const procBuf = await audioCtx.decodeAudioData(await procResp.arrayBuffer());
      const proc = procBuf.getChannelData(0);

      let raw = null;
      const rawFile = stage.file.replace('relax','relax/raw').replace('.mp3','.wav');
      try {
        const rawResp = await fetch(rawFile);
        if (rawResp.ok) {
          const rawBuf = await audioCtx.decodeAudioData(await rawResp.arrayBuffer());
          raw = rawBuf.getChannelData(0);
        }
      } catch {}

      stageWaveforms[stage.name] = { raw, proc, sr: procBuf.sampleRate };
      audioCtx.close();
    } catch (e) { console.warn('waveform load failed', stage.name, e); }
  }

  render();
}

// ── Render all stages ──
function render() {
  $stages.innerHTML = '';
  if (!manifest) return;

  manifest.stages.forEach((stage, si) => {
    const div = document.createElement('div');
    div.className = 'stage';
    div.dataset.idx = si;

    const fx = stageEffects[stage.name] || {};
    const fxParts = [];
    if (fx.speed && fx.speed !== 1) fxParts.push(`${(fx.speed*100).toFixed(0)}%`);
    if (fx.pauses_inserted?.length) fxParts.push(`${fx.pauses_inserted.length} pauses`);
    if (fx.reverb_regions?.length) fxParts.push(`${fx.reverb_regions.length} reverb`);
    if (fx.cmd_words?.length) fxParts.push(`${fx.cmd_words.length} cmd`);
    if (fx.whisper_layer) fxParts.push('warm');

    div.innerHTML = `
      <div class="stage-header">
        ${stage.name}
        <span class="meta">${stage.duration.toFixed(1)}s · ${stage.lines.length} lines${fxParts.length ? ' · ' + fxParts.join(' · ') : ''}</span>
      </div>
    `;

    // Timeline
    const wrap = document.createElement('div');
    wrap.className = 'timeline-wrap';
    wrap.dataset.idx = si;

    const canvas = document.createElement('canvas');
    canvas.className = 'timeline-canvas';
    wrap.appendChild(canvas);

    const cursor = document.createElement('div');
    cursor.className = 'cursor-line';
    cursor.style.left = '0px';
    wrap.appendChild(cursor);

    const hoverTime = document.createElement('div');
    hoverTime.className = 'hover-time';
    hoverTime.style.display = 'none';
    wrap.appendChild(hoverTime);

    div.appendChild(wrap);

    // Click to seek — use CSS width (not canvas.width which includes DPR)
    wrap.addEventListener('click', (e) => {
      const rect = canvas.getBoundingClientRect();
      const x = e.clientX - rect.left + wrap.scrollLeft;
      const cssWidth = parseFloat(canvas.style.width);
      const pct = x / cssWidth;
      playStage(si, pct * stage.duration);
    });

    // Hover time
    wrap.addEventListener('mousemove', (e) => {
      const rect = canvas.getBoundingClientRect();
      const x = e.clientX - rect.left + wrap.scrollLeft;
      const cssWidth = parseFloat(canvas.style.width);
      const t = (x / cssWidth) * stage.duration;
      hoverTime.textContent = `${t.toFixed(2)}s`;
      hoverTime.style.left = `${e.clientX - rect.left + 4}px`;
      hoverTime.style.display = 'block';
    });
    wrap.addEventListener('mouseleave', () => { hoverTime.style.display = 'none'; });

    // Words
    const wordsDiv = document.createElement('div');
    wordsDiv.className = 'words';
    wordsDiv.dataset.idx = si;
    const fxCmds = fx.cmd_words || [];

    for (const line of stage.lines) {
      if (!line.words) continue;
      for (const w of line.words) {
        const span = document.createElement('span');
        span.className = 'word';
        span.textContent = w.word;
        const as = line.startTime + w.start;
        const ae = line.startTime + w.end;
        span.dataset.start = as;
        span.dataset.end = ae;
        if (fxCmds.length && fxCmds.some(c => as >= c.start - 0.05 && ae <= c.end + 0.05)) {
          span.classList.add('cmd');
        }
        wordsDiv.appendChild(span);
      }
      const sep = document.createElement('span');
      sep.className = 'word-sep';
      wordsDiv.appendChild(sep);
    }
    div.appendChild(wordsDiv);

    $stages.appendChild(div);
    drawTimeline(canvas, stage, si);
  });
}

// ── Draw timeline ──
function drawTimeline(canvas, stage, si) {
  requestAnimationFrame(() => {
    const wrap = canvas.parentElement;
    const baseW = wrap.clientWidth;
    const W = Math.floor(baseW * zoom);
    const H = viewMode === 'split' ? 180 : 120;
    const dpr = window.devicePixelRatio || 1;

    canvas.width = W * dpr;
    canvas.height = H * dpr;
    canvas.style.width = W + 'px';
    canvas.style.height = H + 'px';

    const ctx = canvas.getContext('2d');
    ctx.scale(dpr, dpr);
    const dur = stage.duration;
    const fx = stageEffects[stage.name] || {};
    const wf = stageWaveforms[stage.name];
    const show = {
      pauses: document.getElementById('chk-pauses').checked,
      reverb: document.getElementById('chk-reverb').checked,
      cmd: document.getElementById('chk-cmd').checked,
      gaps: document.getElementById('chk-gaps').checked,
      slices: document.getElementById('chk-slices').checked,
    };

    ctx.fillStyle = '#0e0e1a';
    ctx.fillRect(0, 0, W, H);

    if (viewMode === 'split') {
      drawWaveformView(ctx, W, H/2, 0, stage, fx, wf, show, dur, 'raw');
      ctx.strokeStyle = 'rgba(200,160,255,0.1)';
      ctx.beginPath(); ctx.moveTo(0, H/2); ctx.lineTo(W, H/2); ctx.stroke();
      drawWaveformView(ctx, W, H/2, H/2, stage, fx, wf, show, dur, 'proc');
      // Labels
      ctx.fillStyle = 'rgba(200,160,255,0.3)';
      ctx.font = '9px monospace';
      ctx.fillText('raw', 4, 10);
      ctx.fillText('processed', 4, H/2 + 10);
    } else if (viewMode === 'spectrogram') {
      drawSpectrogramView(ctx, W, H, stage, wf, dur);
      drawOverlays(ctx, W, H, 0, stage, fx, show, dur);
    } else {
      drawWaveformView(ctx, W, H, 0, stage, fx, wf, show, dur, 'proc');
    }

    // Time ruler
    ctx.fillStyle = 'rgba(200,160,255,0.15)';
    ctx.font = '9px monospace';
    ctx.textAlign = 'center';
    const step = dur / zoom > 30 ? 5 : dur / zoom > 15 ? 2 : 1;
    for (let t = 0; t <= dur; t += step) {
      const x = (t / dur) * W;
      ctx.fillRect(x, H - 1, 1, -4);
      ctx.fillText(`${t}s`, x, H - 6);
    }
    ctx.textAlign = 'left';

    // Speed label
    if (fx.speed && fx.speed !== 1) {
      ctx.fillStyle = 'rgba(180,100,255,0.4)';
      ctx.font = '9px monospace';
      ctx.textAlign = 'right';
      ctx.fillText(`${(fx.speed*100).toFixed(0)}% speed`, W - 4, 10);
      ctx.textAlign = 'left';
    }
    if (fx.whisper_layer) {
      ctx.fillStyle = 'rgba(200,100,255,0.3)';
      ctx.font = '9px monospace';
      ctx.fillText('\u266B warm layer', 4, H - 6);
    }
  });
}

function drawWaveformView(ctx, W, H, yOff, stage, fx, wf, show, dur, which) {
  ctx.save();
  ctx.translate(0, yOff);

  // Background effects layers
  drawOverlays(ctx, W, H, 0, stage, fx, show, dur);

  // Waveform
  if (wf) {
    const data = which === 'raw' ? wf.raw : wf.proc;
    if (data) {
      const samplesPerPx = data.length / W;
      ctx.strokeStyle = which === 'raw' ? 'rgba(80,120,200,0.5)' : 'rgba(160,120,255,0.6)';
      ctx.lineWidth = 0.5;
      ctx.beginPath();
      const mid = H / 2;
      for (let x = 0; x < W; x++) {
        const si = Math.floor(x * samplesPerPx);
        const ei = Math.min(Math.floor((x + 1) * samplesPerPx), data.length);
        let mn = 0, mx = 0;
        for (let j = si; j < ei; j += Math.max(1, Math.floor((ei - si) / 4))) {
          if (data[j] < mn) mn = data[j];
          if (data[j] > mx) mx = data[j];
        }
        ctx.moveTo(x, mid + mn * mid * 0.9);
        ctx.lineTo(x, mid + mx * mid * 0.9);
      }
      ctx.stroke();

      // RMS envelope
      const rmsWindow = Math.max(1, Math.floor(samplesPerPx * 4));
      ctx.fillStyle = which === 'raw' ? 'rgba(80,120,200,0.15)' : 'rgba(160,120,255,0.15)';
      ctx.beginPath();
      ctx.moveTo(0, mid);
      for (let x = 0; x < W; x += 2) {
        const si = Math.floor(x * samplesPerPx);
        const ei = Math.min(si + rmsWindow, data.length);
        let sum = 0;
        for (let j = si; j < ei; j += 4) sum += data[j] * data[j];
        const rms = Math.sqrt(sum / ((ei - si) / 4 + 1));
        ctx.lineTo(x, mid - rms * mid * 2);
      }
      for (let x = W - 1; x >= 0; x -= 2) {
        const si = Math.floor(x * samplesPerPx);
        const ei = Math.min(si + rmsWindow, data.length);
        let sum = 0;
        for (let j = si; j < ei; j += 4) sum += data[j] * data[j];
        const rms = Math.sqrt(sum / ((ei - si) / 4 + 1));
        ctx.lineTo(x, mid + rms * mid * 2);
      }
      ctx.closePath();
      ctx.fill();
    }
  }

  ctx.restore();
}

function drawSpectrogramView(ctx, W, H, stage, wf, dur) {
  if (!wf?.proc) return;
  const data = wf.proc;
  const fftSize = 512;
  const hop = Math.max(1, Math.floor(data.length / W));

  // Simple spectrogram via short-time energy in frequency bands
  for (let x = 0; x < W; x++) {
    const si = Math.floor(x * data.length / W);
    const seg = data.slice(si, si + fftSize);
    if (seg.length < fftSize) continue;

    // Poor man's spectrum: energy in 8 bands via bandpass approximation
    const bands = 16;
    for (let b = 0; b < bands; b++) {
      let energy = 0;
      const lo = Math.floor(b / bands * fftSize / 2);
      const hi = Math.floor((b + 1) / bands * fftSize / 2);
      for (let j = lo; j < Math.min(hi, seg.length); j++) {
        energy += seg[j] * seg[j];
      }
      energy = Math.sqrt(energy / (hi - lo + 1));
      const intensity = Math.min(1, energy * 15);
      const y = H - (b + 1) / bands * H;
      const bh = H / bands;
      const r = Math.floor(intensity * 200);
      const g = Math.floor(intensity * 80);
      const bl = Math.floor(50 + intensity * 200);
      ctx.fillStyle = `rgba(${r},${g},${bl},${intensity * 0.8})`;
      ctx.fillRect(x, y, 1, bh);
    }
  }
}

function drawOverlays(ctx, W, H, yOff, stage, fx, show, dur) {
  // All word positions
  const allWords = [];
  for (const line of stage.lines) {
    if (!line.words) continue;
    for (const w of line.words) {
      allWords.push({ absStart: line.startTime + w.start, absEnd: line.startTime + w.end, word: w.word });
    }
  }

  // Gaps
  if (show.gaps) {
    for (let i = 1; i < allWords.length; i++) {
      const gs = allWords[i-1].absEnd, ge = allWords[i].absStart;
      const gap = ge - gs;
      if (gap > 0.3) {
        const x = (gs / dur) * W, w = Math.max(1, (gap / dur) * W);
        ctx.fillStyle = `rgba(255,200,100,${Math.min(0.25, gap * 0.06)})`;
        ctx.fillRect(x, yOff, w, H);
        if (gap > 1.0 && w > 20) {
          ctx.fillStyle = 'rgba(255,200,100,0.5)';
          ctx.font = '8px monospace';
          ctx.textAlign = 'center';
          ctx.fillText(`${gap.toFixed(1)}s`, x + w/2, yOff + H - 14);
          ctx.textAlign = 'left';
        }
      }
    }
  }

  // Inserted pauses
  if (show.pauses && fx.pauses_inserted) {
    for (const p of fx.pauses_inserted) {
      const pd = p.duration ?? p.added ?? 0;
      const x = (p.at / dur) * W, w = Math.max(2, (pd / dur) * W);
      ctx.fillStyle = 'rgba(255,160,255,0.1)';
      ctx.fillRect(x, yOff, w, H);
      ctx.strokeStyle = 'rgba(255,160,255,0.25)';
      ctx.setLineDash([2, 3]);
      ctx.beginPath(); ctx.moveTo(x, yOff); ctx.lineTo(x, yOff + H); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(x+w, yOff); ctx.lineTo(x+w, yOff + H); ctx.stroke();
      ctx.setLineDash([]);
      if (w > 18) {
        ctx.fillStyle = 'rgba(255,160,255,0.4)';
        ctx.font = '8px monospace';
        ctx.textAlign = 'center';
        ctx.fillText(`+${pd.toFixed(1)}s`, x + w/2, yOff + 10);
        ctx.textAlign = 'left';
      }
    }
  }

  // Reverb regions
  if (show.reverb && fx.reverb_regions) {
    for (const r of fx.reverb_regions) {
      const x = (r.start / dur) * W, w = Math.max(1, ((r.end - r.start) / dur) * W);
      const grad = ctx.createLinearGradient(x, 0, x + w, 0);
      grad.addColorStop(0, 'rgba(80,200,255,0.0)');
      grad.addColorStop(0.2, 'rgba(80,200,255,0.15)');
      grad.addColorStop(1, 'rgba(80,200,255,0.0)');
      ctx.fillStyle = grad;
      ctx.fillRect(x, yOff + H - 20, w, 18);
    }
  }

  // CMD regions
  if (show.cmd && fx.cmd_words?.length) {
    const groups = [];
    let cur = { start: fx.cmd_words[0].start, end: fx.cmd_words[0].end };
    for (let i = 1; i < fx.cmd_words.length; i++) {
      const c = fx.cmd_words[i];
      if (c.start - cur.end < 0.5) { cur.end = c.end; }
      else { groups.push(cur); cur = { start: c.start, end: c.end }; }
    }
    groups.push(cur);
    for (const g of groups) {
      const x = (g.start / dur) * W, w = Math.max(2, ((g.end - g.start) / dur) * W);
      ctx.fillStyle = 'rgba(255,100,80,0.12)';
      ctx.fillRect(x, yOff + 2, w, H - 4);
      ctx.strokeStyle = 'rgba(255,100,80,0.4)';
      ctx.lineWidth = 1;
      ctx.strokeRect(x, yOff + 2, w, H - 4);
    }
  }

  // Slice boundaries
  if (show.slices) {
    for (const line of stage.lines) {
      const x = (line.startTime / dur) * W;
      ctx.strokeStyle = 'rgba(100,255,100,0.15)';
      ctx.lineWidth = 1;
      ctx.beginPath(); ctx.moveTo(x, yOff); ctx.lineTo(x, yOff + H); ctx.stroke();
    }
  }

  // Slice text labels
  ctx.font = '9px monospace';
  ctx.fillStyle = 'rgba(200,160,255,0.35)';
  for (const line of stage.lines) {
    const x = (line.startTime / dur) * W + 3;
    const txt = line.text.length > 40 ? line.text.substring(0, 40) + '...' : line.text;
    ctx.fillText(txt, x, yOff + 10);
  }
}

// ── Playback ──
function playStage(idx, startTime = 0) {
  stopPlayback();
  currentStageIdx = idx;
  const stage = manifest.stages[idx];
  $stage.textContent = stage.name;

  const file = abMode
    ? stage.file.replace('relax','relax/raw').replace('.mp3','.wav')
    : stage.file;

  audio = new Audio(file);
  audio.currentTime = startTime;
  audio.play().catch(() => {});
  audio.onended = () => {
    if (idx + 1 < manifest.stages.length) playStage(idx + 1, 0);
  };

  const tick = () => {
    if (!audio || audio.paused) return;
    updatePlayback(idx, audio.currentTime);
    animFrame = requestAnimationFrame(tick);
  };
  animFrame = requestAnimationFrame(tick);
}

function updatePlayback(si, time) {
  const stage = manifest.stages[si];
  const dur = stage.duration;

  // Cursor
  const wrap = $stages.querySelector(`.timeline-wrap[data-idx="${si}"]`);
  if (wrap) {
    const canvas = wrap.querySelector('canvas');
    const px = (time / dur) * canvas.width / (window.devicePixelRatio || 1);
    wrap.querySelector('.cursor-line').style.left = `${px}px`;
    // Auto-scroll to keep cursor visible
    if (px > wrap.scrollLeft + wrap.clientWidth - 50) {
      wrap.scrollLeft = px - wrap.clientWidth / 2;
    }
  }

  // Time display
  const m = Math.floor(time / 60), s = (time % 60).toFixed(1);
  const tm = Math.floor(dur / 60), ts = Math.floor(dur % 60);
  $time.textContent = `${m}:${s.padStart(4,'0')} / ${tm}:${String(ts).padStart(2,'0')}`;

  // Word highlights
  const wordsDiv = $stages.querySelector(`.words[data-idx="${si}"]`);
  if (wordsDiv) {
    for (const span of wordsDiv.querySelectorAll('.word')) {
      const ws = parseFloat(span.dataset.start), we = parseFloat(span.dataset.end);
      span.classList.toggle('active', time >= ws && time < we + 0.1);
    }
  }
}

function stopPlayback() {
  if (audio) { audio.pause(); audio = null; }
  if (animFrame) { cancelAnimationFrame(animFrame); animFrame = null; }
  for (const c of $stages.querySelectorAll('.cursor-line')) c.style.left = '0px';
  for (const w of $stages.querySelectorAll('.word.active')) w.classList.remove('active');
  $time.textContent = '0:00.0 / 0:00';
}

// ── Events ──
document.getElementById('btn-play').addEventListener('click', () => {
  if (audio && !audio.paused) { audio.pause(); return; }
  if (audio && audio.paused) {
    audio.play();
    const tick = () => { if (!audio || audio.paused) return; updatePlayback(currentStageIdx, audio.currentTime); animFrame = requestAnimationFrame(tick); };
    animFrame = requestAnimationFrame(tick);
    return;
  }
  playStage(0, 0);
});
document.getElementById('btn-stop').addEventListener('click', stopPlayback);
document.getElementById('btn-prev').addEventListener('click', () => { if (manifest) playStage(Math.max(0, currentStageIdx - 1)); });
document.getElementById('btn-next').addEventListener('click', () => { if (manifest) playStage(Math.min(manifest.stages.length - 1, currentStageIdx + 1)); });

$ab.addEventListener('click', () => {
  abMode = !abMode;
  $ab.classList.toggle('active', abMode);
  $ab.textContent = abMode ? 'A/B: RAW' : 'A/B';
  // If playing, restart at same position
  if (audio && !audio.paused) {
    const t = audio.currentTime;
    playStage(currentStageIdx, t);
  }
});

$session.addEventListener('change', () => { loadSession($session.value); });

$view.addEventListener('change', () => {
  viewMode = $view.value;
  render();
});

$zoom.addEventListener('input', () => {
  zoom = parseFloat($zoom.value);
  render();
});

// Effect toggles
for (const id of ['chk-pauses','chk-reverb','chk-cmd','chk-gaps','chk-slices']) {
  document.getElementById(id).addEventListener('change', render);
}

// Keyboard
document.addEventListener('keydown', (e) => {
  if (e.code === 'Space') { e.preventDefault(); document.getElementById('btn-play').click(); }
  if (e.code === 'ArrowLeft' && audio) { audio.currentTime = Math.max(0, audio.currentTime - 2); }
  if (e.code === 'ArrowRight' && audio) { audio.currentTime = Math.min(audio.duration, audio.currentTime + 2); }
  if (e.code === 'ArrowUp') { e.preventDefault(); document.getElementById('btn-prev').click(); }
  if (e.code === 'ArrowDown') { e.preventDefault(); document.getElementById('btn-next').click(); }
  if (e.key === 'a') { $ab.click(); }
  if (e.key === '+' || e.key === '=') { $zoom.value = Math.min(10, zoom + 0.5); $zoom.dispatchEvent(new Event('input')); }
  if (e.key === '-') { $zoom.value = Math.max(1, zoom - 0.5); $zoom.dispatchEvent(new Event('input')); }
});

// ── Init ──
loadSession($session.value);
</script>
</body>
</html>
